name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  bundle-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Export JS bundle
        run: npx expo export --platform android --output-dir dist

      - name: Get bundle size
        id: bundle_size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Comment bundle size on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Bundle Size:** ${{ steps.bundle_size.outputs.size }}\n\n Build succeeded on this PR.`
            })

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}-bundle
          path: dist/
          retention-days: 3
